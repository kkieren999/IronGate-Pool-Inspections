        <circle cx="68" cy="158" r="1.5"/><circle cx="103" cy="169" r="2.1"/><circle cx="145" cy="160" r="1.7"/><circle cx="178" cy="171" r="2.4"/>
        <circle cx="47" cy="195" r="2.6"/><circle cx="82" cy="203" r="1.4"/><circle cx="118" cy="198" r="2.2"/><circle cx="155" cy="205" r="1.6"/><circle cx="197" cy="190" r="2.5"/>
