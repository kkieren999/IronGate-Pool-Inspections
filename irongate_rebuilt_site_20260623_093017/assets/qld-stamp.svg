<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="QLD stamp icon">
  <defs>
    <style>
      .stamp{fill:none;stroke:#8b0b16;stroke-linecap:round;stroke-linejoin:round}
