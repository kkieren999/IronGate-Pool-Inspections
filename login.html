<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in | IronGate Pool Safety Inspections</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js" defer></script>
  <script src="./login.js" defer></script>
</head>
<body class="login-page-body">
  <main class="login-shell" aria-label="IronGate sign in">
    <section class="login-card">
      <div class="login-brand">
        <img class="login-logo" src="./assets/logo/logo-no-text.png" alt="IronGate logo" />
        <div>
          <h1><span class="iron">Iron</span><span class="gate">Gate</span></h1>
          <p>Pool Safety Inspections</p>
        </div>
      </div>

      <div class="login-intro">
        <h2>Sign in</h2>
        <p>Use your approved IronGate account to access cloud-saved inspections.</p>
      </div>

      <form id="emailLoginForm" class="login-form">
        <label class="login-field">
          <span>Email</span>
          <input id="loginEmail" type="email" autocomplete="email" required />
        </label>

        <label class="login-field">
          <span>Password</span>
          <input id="loginPassword" type="password" autocomplete="current-password" required />
        </label>

        <button class="login-primary-btn" type="submit">Sign in</button>
      </form>

      <div class="login-divider"><span>or</span></div>

      <button id="googleSignInBtn" class="login-google-btn" type="button">
        Sign in with Google
      </button>

      <p id="loginStatus" class="login-status">Checking Firebase...</p>

      <p class="login-note">
        No public sign-up is shown. Add allowed users in Firebase Authentication.
      </p>
    </section>
  </main>
</body>
</html>
