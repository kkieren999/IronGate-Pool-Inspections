name: Deploy Firebase Security Rules

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "firestore.rules"
      - "storage.rules"
      - "firebase-security.json"
      - ".github/workflows/deploy-security-rules.yml"

jobs:
  deploy-firestore-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Prepare Firebase credentials
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > /home/runner/firebase-service-account.json
          test -s /home/runner/firebase-service-account.json
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Show deploy service account
        run: |
          node -e "const fs=require('fs'); const json=JSON.parse(fs.readFileSync('/home/runner/firebase-service-account.json','utf8')); console.log('Deploy service account:', json.client_email);"

      - name: Deploy Firestore rules
        run: npx --yes firebase-tools@15.22.3 deploy --config firebase-security.json --only firestore:rules --project irongate-pool-inspection-256b4 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/firebase-service-account.json
