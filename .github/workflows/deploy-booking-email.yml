name: Deploy Booking Email Function

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "functions-email/**"
      - "firebase.json"
      - ".github/workflows/deploy-booking-email.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: functions-email

      - name: Prepare Firebase credentials
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$HOME/firebase-service-account.json"
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy booking email function
        run: npx firebase-tools deploy --only functions:bookingEmail --project irongate-pool-inspection-256b4 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $HOME/firebase-service-account.json
