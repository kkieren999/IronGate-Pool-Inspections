name: Deploy Booking Email Function

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "functions-email/**"
      - "firebase.json"
      - ".github/workflows/deploy-booking-email.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install dependencies
        run: npm install
        working-directory: functions-email

      - name: Prepare Firebase credentials
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > /home/runner/firebase-service-account.json
          test -s /home/runner/firebase-service-account.json
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy booking email function
        run: npx firebase-tools deploy --only functions:bookingemail --project irongate-pool-inspection-256b4 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /home/runner/firebase-service-account.json
