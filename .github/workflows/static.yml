# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Move hero wave slightly lower
        run: |
          python3 - <<'PY'
          from pathlib import Path

          css_path = Path("irongate_rebuilt_site_20260623_093017/css/styles.css")
          css = css_path.read_text()
          old = ".wave-layer {\n  position: absolute;\n  left: 0;\n  right: 0;\n  bottom: -1px;"
          new = ".wave-layer {\n  position: absolute;\n  left: 0;\n  right: 0;\n  bottom: -28px;"

          if old not in css:
              raise SystemExit("Could not find the hero wave CSS block to update.")

          css_path.write_text(css.replace(old, new, 1))
          PY
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the complete website folder, including index.html, CSS, JS, and assets
          path: './irongate_rebuilt_site_20260623_093017'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
