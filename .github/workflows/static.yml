# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Adjust hero wave spacing
        run: |
          python3 - <<'PY'
          from pathlib import Path

          css_path = Path("irongate_rebuilt_site_20260623_093017/css/styles.css")
          css = css_path.read_text()
          css += """

          /* GitHub Pages deployment override: keep the hero wave inside the hero so it is not clipped. */
          .hero {
            min-height: calc(100vh - var(--header-height) + 70px);
          }

          .hero-inner {
            padding-bottom: 185px;
          }

          .wave-layer {
            bottom: 0;
            height: 190px;
          }

          @media (max-width: 780px) {
            .hero {
              min-height: calc(100vh - var(--header-height) + 45px);
            }

            .hero-inner {
              padding-bottom: 170px;
            }

            .wave-layer {
              bottom: 0;
              height: 180px;
            }
          }
          """
          css_path.write_text(css)
          PY
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the complete website folder, including index.html, CSS, JS, and assets
          path: './irongate_rebuilt_site_20260623_093017'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
